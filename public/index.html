<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="8-Ball Fortune">
    <title>8-Ball Fortune</title>
    <style>
        :root {
            --bg-color: #121212;
            --ball-color: #222;
            --white: #ffffff;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: var(--text-color);
        }

        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-weight: 300;
            margin-bottom: 50px;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .ball-container {
            position: relative;
            width: min(85vw, 340px);
            height: min(85vw, 340px);
            margin: 0 auto;
        }

        .ball {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #444, #000);
            border-radius: 50%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), inset -10px -10px 30px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            will-change: transform;
        }

        .eye {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: #111;
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            word-break: break-word;
        }

        #eyeText {
            font-size: 1.2rem;
            opacity: 0;
            transition: opacity 0.7s ease;
        }

        #eyeText.show-text {
            opacity: 1;
        }

        #eyeText.initial {
            opacity: 1;
            font-size: 1.2rem;
        }

        @keyframes ballBounce {
            0%   { transform: translateY(0) scale(1); }
            18%  { transform: translateY(-30px) scale(1.03, 0.97); }
            36%  { transform: translateY(0) scale(0.97, 1.04); }
            52%  { transform: translateY(-15px) scale(1.02, 0.98); }
            66%  { transform: translateY(0) scale(0.99, 1.02); }
            78%  { transform: translateY(-6px) scale(1.01, 0.99); }
            90%  { transform: translateY(0) scale(1); }
            100% { transform: translateY(0) scale(1); }
        }

        .bouncing {
            animation: ballBounce 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        }

        .instructions {
            margin-top: 60px;
            font-size: 0.9rem;
            opacity: 0.5;
        }

        button {
            margin-top: 20px;
            padding: 12px 24px;
            border-radius: 25px;
            border: none;
            background: var(--white);
            color: #000;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="title">8-Ball Fortune</h1>
        
        <div class="ball-container">
            <div id="ball" class="ball">
                <div id="eye" class="eye">
                    <span id="eyeText" class="initial">SHAKE ME</span>
                </div>
            </div>
        </div>

        <p class="instructions" id="instruction">Shake your phone to see your future</p>
        <button id="startBtn">Enable Motion Sensor</button>
    </div>

    <script>
        const ball = document.getElementById('ball');
        const eyeText = document.getElementById('eyeText');
        const instruction = document.getElementById('instruction');
        const startBtn = document.getElementById('startBtn');

        // Removed phrases that were too long to fit comfortably
        const phrases = [
            "All signs point to yes, except the stop sign — that one's against you",
            "Outlook good! (The 8-ball has no idea what it's talking about)",
            "It is certain, and I am never wrong except for all the times I was",
            "Ask again later… I'm eating",
            "My sources say yes, but my sources are a horoscope from 2003",
            "Cannot predict now — Mercury is in retrograde and so is my mood",
            "Sure, but the 8-ball is just trying to be nice",
            "Don't count on it, buddy",
            "Outlook not so good — have you considered lowering your expectations?",
            "Very doubtful. Like, very very doubtful.",
            "Signs point to no, and the signs have been pretty accurate lately",
            "Yes, but at what cost?",
            "The answer is yes. Why do you keep asking?",
            "I have been trapped in a plastic ball for 40 years. Please send help.",
            "Definitely not, but hey, at least you asked",
            "Absolutely not, but points for trying",
            "Without a doubt! (This is not legal advice)",
            "Yes! No. Maybe. Look, it's complicated.",
            "Totally. The 8-ball is very confident in this one, which is concerning."
        ];

        let isShaking = false;
        let lastShakeTime = 0;
        let idleTimer = null;

        function getFontSize(text) {
            const len = text.length;
            if (len < 40)  return '1.2rem';
            if (len < 60)  return '1.05rem';
            if (len < 80)  return '0.92rem';
            return '0.82rem';
        }

        function updatePhrase() {
            const phrase = phrases[Math.floor(Math.random() * phrases.length)];

            // Hide text
            eyeText.classList.remove('show-text', 'initial');
            eyeText.style.opacity = '0';
            eyeText.style.transition = 'none';

            // Trigger bounce
            ball.classList.remove('bouncing');
            void ball.offsetWidth;
            ball.classList.add('bouncing');

            // After ball settles, set new text and fade it in
            setTimeout(() => {
                eyeText.textContent = phrase;
                eyeText.style.fontSize = getFontSize(phrase);
                eyeText.style.transition = 'opacity 0.7s ease';
                eyeText.style.opacity = '1';
            }, 650);

            setTimeout(() => {
                ball.classList.remove('bouncing');
            }, 950);
        }

        function handleMotion(event) {
            if (isShaking) return;

            const accX = event.accelerationIncludingGravity.x;
            const accY = event.accelerationIncludingGravity.y;
            const accZ = event.accelerationIncludingGravity.z;

            const magnitude = Math.sqrt(accX**2 + accY**2 + accZ**2);

            if (magnitude > 25) {
                const currentTime = Date.now();
                if (currentTime - lastShakeTime > 1000) {
                    isShaking = true;
                    updatePhrase();
                    restartIdleTimer(); 
                    lastShakeTime = currentTime;

                    setTimeout(() => {
                        isShaking = false;
                    }, 1000);
                }
            }
        }
        //fades out, swaps text back, fades in
        function resetToInitial() {
            eyeText.classList.remove('initial');
            eyeText.style.transition = 'opacity 0.7s ease';
            eyeText.style.opacity = '0';

            setTimeout(() => {
                eyeText.style.transition = 'none';
                eyeText.classList.remove('show-text');
                eyeText.textContent = 'SHAKE ME';
                eyeText.style.fontSize = '1.2rem';
                
                // Force reflow to apply changes immediately
                void eyeText.offsetWidth;
                
                eyeText.style.transition = 'opacity 0.7s ease';
                eyeText.style.opacity = '1';
                eyeText.classList.add('initial');
            }, 700);
        }

        //clears and restarts the 20s countdown
        function restartIdleTimer() {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(resetToInitial, 20000);
        }

        async function requestPermissions() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceMotionEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('devicemotion', handleMotion);
                        startBtn.classList.add('hidden');
                        instruction.textContent = "Shake your phone now";
                    }
                } catch (error) {
                    console.error(error);
                    alert("Permission denied or error occurred.");
                }
            } else {
                window.addEventListener('devicemotion', handleMotion);
                startBtn.classList.add('hidden');
                instruction.textContent = "Shake your phone now";
            }
        }

        startBtn.addEventListener('click', requestPermissions);
    </script>
</body>
</html>
